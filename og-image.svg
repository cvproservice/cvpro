<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#12121A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8C97A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0H0v60" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gold accent top bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#gold)"/>

  <!-- Left glow -->
  <ellipse cx="200" cy="315" rx="350" ry="250" fill="#C9A84C" opacity="0.04"/>

  <!-- Logo area -->
  <text x="600" y="200" font-family="Arial Black, Arial" font-weight="900" font-size="110" fill="url(#gold)" text-anchor="middle" letter-spacing="4">CV</text>
  <text x="720" y="200" font-family="Arial Black, Arial" font-weight="900" font-size="110" fill="#F5F5F0" text-anchor="middle" letter-spacing="4">Pro</text>

  <!-- Main tagline -->
  <text x="600" y="295" font-family="Arial, sans-serif" font-weight="700" font-size="38" fill="#F5F5F0" text-anchor="middle">خبراء كتابة CV احترافي متوافق مع ATS</text>

  <!-- Sub tagline -->
  <text x="600" y="355" font-family="Arial, sans-serif" font-weight="400" font-size="26" fill="#AAAACC" text-anchor="middle">مصر · السعودية · الإمارات · الكويت · الوطن العربي</text>

  <!-- Stats row -->
  <rect x="200" y="405" width="220" height="80" rx="16" fill="#1A1A26" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.4"/>
  <text x="310" y="445" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#C9A84C" text-anchor="middle">+500</text>
  <text x="310" y="470" font-family="Arial, sans-serif" font-size="16" fill="#AAAACC" text-anchor="middle">عميل راضي</text>

  <rect x="490" y="405" width="220" height="80" rx="16" fill="#1A1A26" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="445" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#C9A84C" text-anchor="middle">95%</text>
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="16" fill="#AAAACC" text-anchor="middle">نجاح في ATS</text>

  <rect x="780" y="405" width="220" height="80" rx="16" fill="#1A1A26" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.4"/>
  <text x="890" y="445" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#C9A84C" text-anchor="middle">48h</text>
  <text x="890" y="470" font-family="Arial, sans-serif" font-size="16" fill="#AAAACC" text-anchor="middle">تسليم سريع</text>

  <!-- Bottom URL -->
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="20" fill="#C9A84C" text-anchor="middle" opacity="0.8">cvproservice.github.io/cvpro</text>

  <!-- Bottom gold bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)" opacity="0.5"/>
</svg>
